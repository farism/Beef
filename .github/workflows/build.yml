  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Deps (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev
      
      - name: Install Deps (MacOS)
        if: contains(matrix.os, 'macos')
        run: |
          brew update
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> $GITHUB_PATH

      - name: Build (Ubuntu and MacOS)
        if: contains(matrix.os, 'ubuntu') || contains(matrix.os, 'macos')
        run: |
          bin/build.sh
          cd BeefLibs
          zip -r ../${{ matrix.os }}.zip corlib
          cd ../IDE/dist
          sed -i.bak 's/..\/..\/BeefLibs/./g' BeefConfig.toml
          zip -r ../../${{ matrix.os }}.zip BeefConfig.toml BeefBuild libBeefRT.a

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: ${{ matrix.os }}.zip
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*