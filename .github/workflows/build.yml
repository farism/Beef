  build-macos:
    name: Build on macOS
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # - name: Install Deps
      #   run: |
      #     brew update
      #     brew install llvm@22
      #     echo "$(brew --prefix llvm@22)/bin" >> $GITHUB_PATH
      # - name: Build
      #   run: |
      #     bin/build.sh
      #     cd IDE/dist
      #     zip ../../${{ matrix.os }}.zip BeefBuild BeefBuild_d libBeefRT.a libBeefRT_d.a
      - name: Build
        run: |
          bin/build.sh
          cd IDE/dist
          zip ../../${{ matrix.os }}.zip notes.txt
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: ${{ matrix.os }}.zip
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-macos]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Upload archives to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            macos-latest.zip
            macos-15-intel.zip

