  build-macos:
    name: Build on macOS
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      # - name: Checkout Code
      #   uses: actions/checkout@v4
      # - name: Install Deps
      #   run: |
