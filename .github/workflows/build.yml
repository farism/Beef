name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.PAT }}

build_archive: 
  - &build_archive
    - name: Build
      run: |
        bin/build.sh
        mkdir archive
        cp -r BeefLibs/corlib IDE/dist/BeefBuild_d IDE/dist/libBeefRT.a IDE/dist/BeefConfig.toml archive
        sed -i'' 's/..\/..\/BeefLibs/./g' archive/BeefConfig.toml
        cd archive
        zip -r ../${{ matrix.os }}.zip .

upload_artifacts: 
  - &upload_artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}
        path: ${{ matrix.os }}.zip
        retention-days: 1

jobs:
  build-windows:
    name: Build on Windows
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Build
        shell: pwsh
        run: |
          bin/build.bat
          cd IDE/dist
          Compress-Archive -Path BeefBuild.exe, Beef042RT64.dll, Beef042Dbg64.dll, Beef042RT32.dll, Beef042Dbg32.dll -DestinationPath ..\..\${{ matrix.os }}.zip
      *upload_artifacts

  build-linux:
    name: Build on Linux
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Install Deps
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev
      *build_archive
      *upload_artifacts

  build-macos:
    name: Build on macOS
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Deps
        run: |
          brew update
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> $GITHUB_PATH
      <<: *build_archive
      <<: *upload_artifacts

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload archives to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*

