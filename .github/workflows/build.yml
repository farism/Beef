  build-macos:
    name: Build on macOS
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Deps
        run: |
          brew update
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> $GITHUB_PATH
      - name: Build
        run: |
          bin/build.sh
          mkdir artifacts
          cp IDE/dist/BeefBuild_d artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: artifacts
          retention-days: 7